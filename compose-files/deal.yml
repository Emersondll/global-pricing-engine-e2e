version: "3.9"

services:

  # --- deal-service ---
  deal-relay:
    build: ../deal-service/relay/target/docker/
    image: deal-relay-service:latest
    env_file:
      - environment/deal/relay.env
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 5004" ]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      "rabbitmq":
        condition: service_healthy
      "mongo":
        condition: service_healthy
    logging:
      driver: json-file
    ports:
      - 5004:5004
    networks:
      - gpe-e2e-tests

  deal-consumer:
    build: ../deal-service/consumer/target/docker/
    image: deal-consumer:latest
    env_file:
      - environment/deal/consumer.env
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 5005" ]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      "rabbitmq":
        condition: service_healthy
      "mongo":
        condition: service_healthy
    logging:
      driver: json-file
    networks:
      - gpe-e2e-tests

  deal-api:
    build: ../deal-service/api/target/docker/
    image: deal-service:latest
    env_file:
      - environment/deal/api.env
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 5006" ]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      "mongo":
        condition: service_healthy
    logging:
      driver: json-file
    ports:
      - 5006:5006
    networks:
      - gpe-e2e-tests